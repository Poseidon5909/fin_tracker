{% extends 'base.html' %}
{% set title = 'Edit Expense' %}

{% block content %}
<section class="card panel narrow">
  <div class="section-head">
    <div>
      <p class="eyebrow">Edit expense</p>
      <h2>Update this transaction</h2>
    </div>
  </div>

  <form class="expense-form" method="post">
    <label>Date</label>
    <input type="date" name="spent_on" value="{{ expense.spent_on }}" required>

    <label>Category</label>
    <select name="category" required>
      {% for category in categories %}
        <option value="{{ category }}" {% if category == expense.category %}selected{% endif %}>{{ category }}</option>
      {% endfor %}
    </select>

    <label>Description</label>
    <input type="text" name="description" value="{{ expense.description }}" required>

    <label>Amount</label>
    <input type="number" step="0.01" min="0" name="amount" value="{{ '%.2f'|format(expense.amount) }}" required>

    <button type="submit" class="btn primary">Save changes</button>
  </form>
</section>
{% endblock %}
